name: Release Obsidian plugin

on:
  push:
    tags: ["*"]

permissions:
  contents: write
  id-token: write # required for build provenance attestation
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - run: npm ci
      - run: npm test
      - run: npm run build
      # one attestation per asset: some verifiers mishandle multi-subject bundles
      - name: Attest main.js
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: main.js
      - name: Attest manifest.json
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: manifest.json
      - name: Attest styles.css
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: styles.css
      - name: Create release with plugin artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" main.js manifest.json styles.css \
            --title "$GITHUB_REF_NAME" --generate-notes
