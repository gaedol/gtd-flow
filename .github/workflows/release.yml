name: Release Obsidian plugin

on:
  push:
    tags: ["*"]

permissions:
  contents: write
  id-token: write # required for build provenance attestation
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Version-stamp styles.css (unique digest per release)
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          printf '/* gtd-flow %s */\n' "$VERSION" | cat - styles.css > styles.tmp
          mv styles.tmp styles.css
      # one build-provenance attestation per asset, via the current canonical
      # action (actions/attest@v4) per GitHub's artifact-attestations guide
      - name: Attest main.js
        uses: actions/attest@v4
        with:
          subject-path: 'main.js'
      - name: Attest manifest.json
        uses: actions/attest@v4
        with:
          subject-path: 'manifest.json'
      - name: Attest styles.css
        uses: actions/attest@v4
        with:
          subject-path: 'styles.css'
      - name: Create release with plugin artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" main.js manifest.json styles.css \
            --title "$GITHUB_REF_NAME" --generate-notes
